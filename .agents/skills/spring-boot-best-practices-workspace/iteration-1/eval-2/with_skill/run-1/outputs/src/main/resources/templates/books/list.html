<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/base :: layout(~{::title}, ~{::#content})}">
<head>
    <title>Book Catalog</title>
</head>
<body>
<div id="content" class="space-y-12">
    <!-- Header/Introduction -->
    <div class="text-center space-y-4">
        <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight sm:text-4xl">Our Book Collection</h2>
        <p class="max-w-2xl mx-auto text-lg text-slate-500">Discover and manage premium titles in our curated catalog.</p>
    </div>

    <!-- Books Grid -->
    <div class="grid gap-6 md:grid-cols-2">
        <div th:each="book : ${books}" class="bg-white rounded-2xl shadow-sm border border-slate-200 hover:shadow-md transition-shadow duration-200 flex flex-col p-6">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h3 class="text-xl font-bold text-slate-900 th:text" th:text="${book.title}">Book Title</h3>
                    <p class="text-sm font-medium text-teal-600 mt-1" th:text="${'By ' + book.author}">Author</p>
                </div>
                <span class="text-lg font-bold text-slate-900" th:text="${'$' + book.price}">$0.00</span>
            </div>
            <p class="text-slate-600 text-sm flex-grow mb-6" th:text="${book.description}">Description</p>
            <div class="border-t border-slate-100 pt-4 flex justify-between items-center text-xs text-slate-400">
                <span th:text="${'ISBN: ' + book.isbn}">ISBN</span>
                <span class="bg-slate-100 text-slate-600 px-2 py-1 rounded">Available</span>
            </div>
        </div>
    </div>

    <!-- Empty state -->
    <div th:if="${books.isEmpty()}" class="text-center py-12 bg-white rounded-2xl border border-slate-200">
        <span class="text-4xl">📭</span>
        <h3 class="mt-2 text-sm font-medium text-slate-900">No books found</h3>
        <p class="mt-1 text-sm text-slate-500">Get started by creating a new book in the catalog.</p>
    </div>

    <!-- Add Book Section -->
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 sm:p-8">
        <h3 class="text-xl font-bold text-slate-900 mb-6">Add New Book</h3>
        <form th:action="@{/books/add}" th:object="${newBook}" method="post" class="space-y-6">
            <div class="grid gap-6 sm:grid-cols-2">
                <div>
                    <label for="title" class="block text-sm font-medium text-slate-700 mb-1">Title</label>
                    <input type="text" id="title" th:field="*{title}" class="w-full px-4 py-2 border border-slate-300 rounded-lg shadow-sm focus:ring-2 focus:ring-teal-500 focus:border-teal-500 text-sm" placeholder="e.g. The Hobbit" />
                    <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="text-rose-600 text-xs mt-1"></p>
                </div>
                <div>
                    <label for="author" class="block text-sm font-medium text-slate-700 mb-1">Author</label>
                    <input type="text" id="author" th:field="*{author}" class="w-full px-4 py-2 border border-slate-300 rounded-lg shadow-sm focus:ring-2 focus:ring-teal-500 focus:border-teal-500 text-sm" placeholder="e.g. J.R.R. Tolkien" />
                    <p th:if="${#fields.hasErrors('author')}" th:errors="*{author}" class="text-rose-600 text-xs mt-1"></p>
                </div>
            </div>

            <div class="grid gap-6 sm:grid-cols-2">
                <div>
                    <label for="isbn" class="block text-sm font-medium text-slate-700 mb-1">ISBN</label>
                    <input type="text" id="isbn" th:field="*{isbn}" class="w-full px-4 py-2 border border-slate-300 rounded-lg shadow-sm focus:ring-2 focus:ring-teal-500 focus:border-teal-500 text-sm" placeholder="e.g. 978-0261103343" />
                    <p th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}" class="text-rose-600 text-xs mt-1"></p>
                </div>
                <div>
                    <label for="price" class="block text-sm font-medium text-slate-700 mb-1">Price ($)</label>
                    <input type="number" step="0.01" id="price" th:field="*{price}" class="w-full px-4 py-2 border border-slate-300 rounded-lg shadow-sm focus:ring-2 focus:ring-teal-500 focus:border-teal-500 text-sm" placeholder="e.g. 14.99" />
                    <p th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="text-rose-600 text-xs mt-1"></p>
                </div>
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-slate-700 mb-1">Description</label>
                <textarea id="description" th:field="*{description}" rows="3" class="w-full px-4 py-2 border border-slate-300 rounded-lg shadow-sm focus:ring-2 focus:ring-teal-500 focus:border-teal-500 text-sm" placeholder="Brief summary of the book..."></textarea>
                <p th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="text-rose-600 text-xs mt-1"></p>
            </div>

            <div class="flex justify-end">
                <button type="submit" class="px-6 py-2 bg-teal-600 hover:bg-teal-700 text-white text-sm font-medium rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition duration-150 ease-in-out">Add Book</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
