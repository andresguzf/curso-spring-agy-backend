<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Books List')}"></head>
<body class="flex flex-col min-h-screen bg-slate-50 text-slate-800">

    <header th:replace="~{layout/base :: header}"></header>

    <!-- Main Content Area with centered content -->
    <main class="flex-grow max-w-6xl w-full mx-auto px-4 py-8">
        <div class="mb-8 border-b border-slate-200 pb-5">
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Available Books</h1>
            <p class="text-slate-600 mt-2">Discover our curated collection of books.</p>
        </div>

        <!-- Book Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div th:each="book : ${books}" class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-md transition duration-300 flex flex-col">
                <div class="bg-indigo-50 p-6 flex items-center justify-center border-b border-slate-100">
                    <span class="text-6xl select-none">📖</span>
                </div>
                <div class="p-6 flex-grow flex flex-col justify-between">
                    <div>
                        <span class="inline-block text-xs font-semibold text-indigo-600 uppercase tracking-wider bg-indigo-50 px-2.5 py-1 rounded-full mb-3" th:text="${book.publishYear}">1925</span>
                        <h2 class="text-xl font-bold text-slate-900 leading-snug mb-1" th:text="${book.title}">Book Title</h2>
                        <p class="text-slate-500 text-sm mb-4" th:text="'By ' + ${book.author}">Author Name</p>
                        <p class="text-slate-650 text-sm line-clamp-3 mb-6" th:text="${book.description}">Short description of the book...</p>
                    </div>
                    <div class="flex items-center justify-between mt-auto">
                        <span class="text-2xl font-black text-indigo-900" th:text="'$' + ${book.price}">$14.99</span>
                        <a th:href="@{/books/{id}(id=${book.id})}" class="inline-flex items-center justify-center px-4 py-2 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 transition duration-150 text-sm shadow-sm hover:shadow">
                            View Details
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout/base :: footer}"></footer>

</body>
</html>
