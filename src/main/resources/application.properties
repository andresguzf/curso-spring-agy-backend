spring.config.import=optional:file:.env[.properties]

spring.application.name=3-spring-api
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://curso-spring-agy-frontend.vercel.app,http://localhost:5173,http://localhost:3000}
